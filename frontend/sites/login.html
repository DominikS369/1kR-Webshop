<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 mb-4">Login</h1>

                    <form id="loginForm" novalidate>
                        <div class="mb-3">
                            <label for="username" class="form-label">Benutzername oder E-Mail *</label>
                            <input type="text" id="username" name="username" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Passwort *</label>
                            <input type="password" id="password" name="password" class="form-control" required>
                        </div>

                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="remember" name="remember">
                            <label class="form-check-label" for="remember">
                                Eingeloggt bleiben
                            </label>
                        </div>

                        <div id="messageBox" class="alert d-none mt-3" role="alert"></div>

                        <div class="mt-4 d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Einloggen</button>
                            <button type="reset" class="btn btn-outline-secondary">Zurücksetzen</button>
                        </div>
                    </form>

                    <hr class="my-4">

                    <div id="sessionStatus" class="small text-muted">
                        Login-Status wird geprüft ...
                    </div>

                    <button id="logoutBtn" class="btn btn-danger btn-sm mt-3 d-none">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="../js/login.js"></script>
</body>
</html>
