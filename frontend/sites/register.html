<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrierung</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h1 class="h3 mb-4">Registrierung</h1>

          <form id="registerForm" novalidate>
            <div class="row g-3">
              <div class="col-md-3">
                <label for="salutation" class="form-label">Anrede</label>
                <select id="salutation" name="salutation" class="form-select">
                  <option value="">Bitte wählen</option>
                  <option value="Herr">Herr</option>
                  <option value="Frau">Frau</option>
                  <option value="Divers">Divers</option>
                </select>
              </div>

              <div class="col-md-4">
                <label for="firstname" class="form-label">Vorname *</label>
                <input type="text" id="firstname" name="firstname" class="form-control" required>
              </div>

              <div class="col-md-5">
                <label for="lastname" class="form-label">Nachname *</label>
                <input type="text" id="lastname" name="lastname" class="form-control" required>
              </div>

              <div class="col-12">
                <label for="address" class="form-label">Adresse *</label>
                <input type="text" id="address" name="address" class="form-control" required>
              </div>

              <div class="col-md-4">
                <label for="zip" class="form-label">PLZ *</label>
                <input type="text" id="zip" name="zip" class="form-control" required>
              </div>

              <div class="col-md-8">
                <label for="city" class="form-label">Ort *</label>
                <input type="text" id="city" name="city" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label for="email" class="form-label">E-Mail *</label>
                <input type="email" id="email" name="email" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label for="username" class="form-label">Benutzername *</label>
                <input type="text" id="username" name="username" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label for="password" class="form-label">Passwort *</label>
                <input type="password" id="password" name="password" class="form-control" required minlength="6">
              </div>

              <div class="col-md-6">
                <label for="password2" class="form-label">Passwort wiederholen *</label>
                <input type="password" id="password2" name="password2" class="form-control" required minlength="6">
              </div>

              <div class="col-12">
                <label for="payment_info" class="form-label">Zahlungsinformationen</label>
                <textarea id="payment_info" name="payment_info" class="form-control" rows="3"></textarea>
              </div>
            </div>

            <div id="messageBox" class="alert d-none mt-4" role="alert"></div>

            <div class="mt-4 d-flex gap-2">
              <button type="submit" class="btn btn-primary">Registrieren</button>
              <button type="reset" class="btn btn-outline-secondary">Zurücksetzen</button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="../js/register.js"></script>
</body>
</html>
